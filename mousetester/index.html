    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 800px;
            width: 100%;
        }

        .title {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #ffffff;
        }

        .title .highlight {
            color: #e91e63;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #888888;
            margin-bottom: 3rem;
            font-weight: 400;
        }

        .mouse-container {
            position: relative;
            display: inline-block;
            margin: 2rem 0;
        }

        .mouse {
            width: 200px;
            height: 320px;
            background: #ffffff;
            border-radius: 25px 25px 25px 25px;
            position: relative;
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.3),
                0 5px 15px rgba(0, 0, 0, 0.2);
            border: 2px solid #808080;
        }

        .button {
            position: absolute;
            border: 1.25px solid #C0C0C0;
            background: #ffffff;
            transition: all 0.15s ease;
            cursor: pointer;
            border-radius: 8px;
        }

        .button.active {
            background: #e91e63;
            border-color: #e91e63;
            box-shadow: 
                0 0 15px rgba(233, 30, 99, 0.5),
                0 2px 8px rgba(233, 30, 99, 0.3);
            transform: scale(1.02);
        }

        .left-click {
            top: 20px;
            left: 20px;
            width: 60px;
            height: 120px;
            border-radius: 8px 8px 8px 8px;
        }

        .right-click {
            top: 20px;
            right: 20px;
            width: 60px;
            height: 120px;
            border-radius: 8px 8px 8px 8px;
        }

        .middle-click {
            top: 20px;
            left: 83px;
            width: 30px;
            height: 100px;
            border-radius: 15px;
        }

        .scroll-up, .scroll-down {
            left: 88px;
            width: 20px;
            height: 30px;
            background: #f5f5f5;
        }

        .scroll-up {
            top: 30px;
            border-radius: 10px 10px 8px 8px;
        }

        .scroll-down {
            top: 80px;
            border-radius: 8px 8px 10px 10px;
        }

        .side-button-1 {
            top: 160px;
            left: 5px;
            width: 15px;
            height: 50px;
            border-radius: 4px 4px 4px 4px;
        }

        .side-button-2 {
            top: 220px;
            left: 5px;
            width: 15px;
            height: 50px;
            border-radius: 4px 4px 4px 4px;
        }

        .status-info {
            margin: 2rem 0;
            padding: 1rem;
            background: #222222;
            border-radius: 12px;
            border: 1px solid #333333;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }

        .device-info {
            color: #e91e63;
            margin-bottom: 0.5rem;
        }

        .vendor-info {
            color: #888888;
            font-size: 0.8rem;
        }

        .button-labels {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .label {
            background: #222222;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #333333;
            transition: all 0.3s ease;
        }

        .label.active {
            background: rgba(233, 30, 99, 0.1);
            border-color: #e91e63;
            box-shadow: 0 0 10px rgba(233, 30, 99, 0.2);
        }

        .label-title {
            font-weight: 600;
            margin-bottom: 0.3rem;
            color: #fff;
            font-size: 0.9rem;
        }

        .label-desc {
            font-size: 0.8rem;
            color: #888888;
        }

        .label-value {
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            color: #e91e63;
            margin-top: 0.3rem;
        }

        @media (max-width: 768px) {
            .title {
                font-size: 2rem;
            }
            
            .button-labels {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }
            
            .mouse {
                width: 160px;
                height: 256px;
            }
            
            .left-click, .right-click {
                width: 56px;
                height: 80px;
            }
            
            .middle-click {
                width: 24px;
                height: 64px;
            }
        }

        .instruction {
            margin-top: 2rem;
            color: #666666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Mouse<span class="highlight">tester</span></h1>
        
        
        <div class="mouse-container">
            <div class="mouse">
                <div class="button left-click" data-button="0"></div>
                <div class="button right-click" data-button="2"></div>
                <div class="button middle-click" data-button="1"></div>
                <div class="button scroll-up" data-scroll="up"></div>
                <div class="button scroll-down" data-scroll="down"></div>
                <div class="button side-button-1" data-button="3"></div>
                <div class="button side-button-2" data-button="4"></div>
            </div>
        </div>


        <div class="button-labels">
            <div class="label" data-label="0">
                <div class="label-title">B1</div>
                <div class="label-desc">Left Click</div>
                <div class="label-value" id="b1-value">0</div>
            </div>
            <div class="label" data-label="2">
                <div class="label-title">B2</div>
                <div class="label-desc">Right Click</div>
                <div class="label-value" id="b2-value">0</div>
            </div>
            <div class="label" data-label="1">
                <div class="label-title">B3</div>
                <div class="label-desc">Middle Click</div>
                <div class="label-value" id="b3-value">0</div>
            </div>
            <div class="label" data-label="3">
                <div class="label-title">B4</div>
                <div class="label-desc">Forward</div>
                <div class="label-value" id="b4-value">0</div>
            </div>
            <div class="label" data-label="4">
                <div class="label-title">B5</div>
                <div class="label-desc">Backward</div>
                <div class="label-value" id="b5-value">0</div>
            </div>
            <div class="label" data-label="scroll">
                <div class="label-title">Scroll</div>
                <div class="label-desc">Wheel</div>
                <div class="label-value" id="scroll-value">0</div>
            </div>
        </div>

        <div class="instruction">
            Click mouse buttons and scroll to test functionality
        </div>
    </div>

    <script>
        // Button press tracking
        const buttonElements = document.querySelectorAll('.button');
        const labelElements = document.querySelectorAll('.label');
        const activeButtons = new Set();
        
        // Press counters
        const buttonCounts = {
            0: 0, // Left click
            1: 0, // Middle click
            2: 0, // Right click
            3: 0, // Side button 1
            4: 0  // Side button 2
        };
        
        let scrollUpCount = 0;
        let scrollDownCount = 0;

        // Prevent context menu to allow right-click testing
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });

        // Mouse button press events
        document.addEventListener('mousedown', (e) => {
            e.preventDefault();
            activateButton(e.button);
        });

        document.addEventListener('mouseup', (e) => {
            e.preventDefault();
            deactivateButton(e.button);
        });

        // Scroll wheel events
        document.addEventListener('wheel', (e) => {
            e.preventDefault();
            
            if (e.deltaY < 0) {
                // Scroll up
                activateScroll('up');
            } else {
                // Scroll down
                activateScroll('down');
            }
        });

        function activateButton(buttonNumber) {
            activeButtons.add(buttonNumber);
            
            // Increment button press count
            if (buttonCounts.hasOwnProperty(buttonNumber)) {
                buttonCounts[buttonNumber]++;
            }
            
            // Find and activate the corresponding button element
            const buttonElement = document.querySelector(`[data-button="${buttonNumber}"]`);
            const labelElement = document.querySelector(`[data-label="${buttonNumber}"]`);
            
            if (buttonElement) {
                buttonElement.classList.add('active');
            }
            
            if (labelElement) {
                labelElement.classList.add('active');
            }

            // Update value display
            updateButtonValue(buttonNumber, buttonCounts[buttonNumber]);
        }

        function deactivateButton(buttonNumber) {
            activeButtons.delete(buttonNumber);
            
            // Find and deactivate the corresponding button element
            const buttonElement = document.querySelector(`[data-button="${buttonNumber}"]`);
            const labelElement = document.querySelector(`[data-label="${buttonNumber}"]`);
            
            if (buttonElement) {
                buttonElement.classList.remove('active');
            }
            
            if (labelElement) {
                labelElement.classList.remove('active');
            }
        }

        function activateScroll(direction) {
            const scrollElement = document.querySelector(`[data-scroll="${direction}"]`);
            const scrollLabel = document.querySelector('[data-label="scroll"]');
            
            if (direction === 'up') {
                scrollUpCount++;
            } else {
                scrollDownCount++;
            }
            
            if (scrollElement) {
                scrollElement.classList.add('active');
                // Auto-deactivate after a short time
                setTimeout(() => {
                    scrollElement.classList.remove('active');
                }, 200);
            }
            
            if (scrollLabel) {
                scrollLabel.classList.add('active');
                document.getElementById('scroll-value').textContent = `${scrollUpCount} / -${scrollDownCount}`;
                setTimeout(() => {
                    scrollLabel.classList.remove('active');
                }, 200);
            }
        }

        function updateButtonValue(buttonNumber, count) {
            const valueMap = {
                0: 'b1-value',
                1: 'b3-value',
                2: 'b2-value',
                3: 'b4-value',
                4: 'b5-value'
            };
            
            const elementId = valueMap[buttonNumber];
            if (elementId) {
                const element = document.getElementById(elementId);
                if (element) {
                    element.textContent = count.toString();
                }
            }
        }

        // Add some interactive feedback
        buttonElements.forEach(button => {
            button.addEventListener('mouseenter', () => {
                if (!button.classList.contains('active')) {
                    button.style.transform = 'scale(1.01)';
                }
            });
            
            button.addEventListener('mouseleave', () => {
                if (!button.classList.contains('active')) {
                    button.style.transform = 'scale(1)';
                }
            });
        });
    </script>
</body>
</html>
